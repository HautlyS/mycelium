name: CI Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build and publish to GitHub Pages (simple static deploy)
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_type: static

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Build native (CPU) version
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --workspace

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mycelium-native
          path: target/release/mycelium-node

  # Build WASM version
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web crates/mycelium-web --out-dir pkg

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycelium-web
          path: pkg/

  # Build with CUDA (optional - only runs on GPU runners)
  build-cuda:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with CUDA
        run: cargo build --release --features cuda

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mycelium-cuda
          path: target/release/mycelium-node

# Release on every push to main
release:
  needs: [build-native, build-wasm]
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  runs-on: ubuntu-latest
  permissions:
    contents: write
  steps:
    - uses: actions/checkout@v4

    - name: Download native binary
      uses: actions/download-artifact@v4
      with:
        name: mycelium-native

    - name: Download WASM artifact
      uses: actions/download-artifact@v4
      with:
        name: mycelium-web
        path: web/

    - name: Prepare release
      run: |
        chmod +x mycelium-node
        mkdir -p release
        mv mycelium-node release/
        mv web/pkg release/web 2>/dev/null || true

    - name: Create checksums
      run: |
        cd release
        sha256sum mycelium-node > mycelium-node.sha256
        if [ -d web ]; then
          tar czf mycelium-web.tar.gz web/
          sha256sum mycelium-web.tar.gz > mycelium-web.sha256
        fi
        ls -la

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        files: |
          release/mycelium-node
          release/mycelium-node.sha256
          release/mycelium-web.tar.gz
          release/mycelium-web.sha256
        generate_release_notes: true